{% extends 'base.html' %}

{% block content %}
{% load crispy_forms_tags %}

<h3 class="text-center">Login</h3>
<form method="POST" action="{% url 'login' %}">
    {% csrf_token %}
    {{ form | crispy }}
    <button class="btn btn-warning" style="width:500; margin:auto" type="submit">Signin</button>
</form><br>



{% endblock %}
