<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>404 - Page Not Found</title>

    <style>
        @import url('https://fonts.googleapis.com/css?family=Gilda+Display');

      html, body {
    height: 100%;
    margin: 0;
    background-color: black;
    color: white;
    font-family: 'Gilda Display', serif;
}

/* CENTER EVERYTHING */
body {
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Remove absolute positioning */
.error {
    text-align: center;
    animation: noise-3 1s linear infinite;
}

.wrap {
    position: static;
}

.info {
    position: static;
    margin-top: 20px;
}
    </style>
</head>

<body>

<div class="error">
    <div class="wrap">
        <div class="404">
<pre><code>
<span class="green">&lt;!DOCTYPE html&gt;</span>
<span class="orange">&lt;html&gt;</span>
<span class="orange">&lt;body&gt;</span>

ERROR 404!
FILE NOT FOUND!

<span class="comment">&lt;!-- The page you are looking for does not exist --&gt;</span>

<span class="orange">&lt;/body&gt;</span>
<span class="orange">&lt;/html&gt;</span>
</code></pre>
        </div>
    </div>

    <div class="info">
        <h1>Category Not Found</h1>
    </div>
</div>

</body>
</html>
